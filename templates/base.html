<!DOCTYPE html>
<html lang="<!--LANG-->">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5">

  <title><!--TITLE--></title>
  <link rel="canonical" href="<!--CANONICAL-->">

  <meta name="description" content="<!--DESCRIPTION-->">
  <meta property="og:site_name" content="<!--SITE_TITLE-->">
  <meta property="og:title" content="<!--OG_TITLE-->">
  <meta property="og:type" content="<!--OG_TYPE-->">
  <meta property="og:url" content="<!--CANONICAL-->">
  <meta property="og:description" content="<!--DESCRIPTION-->">
  <meta name="twitter:title" content="<!--OG_TITLE-->">
  <meta name="twitter:description" content="<!--DESCRIPTION-->">
<!--OG_IMAGE-->

  <link rel="alternate" type="application/atom+xml" href="<!--PRE-->feed.xml" title="<!--SITE_TITLE-->">

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20100%20100'%3E%3Ctext%20y='.9em'%20font-size='90'%3E🐼%3C/text%3E%3C/svg%3E">

  <link rel="stylesheet" href="<!--PRE-->themes/<!--DEFAULT_THEME-->.css" id="theme-style">
  <link rel="stylesheet" href="<!--PRE-->static/base.css">
  <link rel="stylesheet" href="<!--PRE-->static/syntax-light.css" id="syntax-light" media="(prefers-color-scheme: light)">
  <link rel="stylesheet" href="<!--PRE-->static/syntax-dark.css" id="syntax-dark" media="(prefers-color-scheme: dark)">
<!--JSONLD-->
</head>

<body class="<!--PAGE_TYPE-->">
  <header>
    <a class="title" href="<!--PRE-->">
      <h1><!--SITE_TITLE--></h1>
    </a>
    <nav>
      <p><!--NAV--> <span id="theme-switcher">
        <label for="theme-picker">Theme</label>
        <select id="theme-picker" onchange="switchTheme(this.value)">
<!--THEME_OPTIONS-->
        </select>
      </span></p>
    </nav>
  </header>
  <main>
<!--MAIN-->
  </main>
  <script>
(function () {
  var THEMES = [
    ['default', 'Default'],
    ['solarized', 'Solarized'],
    ['dracula', 'Dracula'],
    ['nord', 'Nord'],
    ['rose-pine', 'Rosé Pine'],
    ['terminal', 'Terminal'],
    ['serif', 'Serif'],
    ['contrast', 'Contrast'],
    ['minimal', 'Minimal']
  ];
  var FORCED_DARK = ['dracula', 'nord', 'rose-pine', 'terminal'];
  var FORCED_LIGHT = [];
  var SAVED = localStorage.getItem('theme') || 'default';
  var ACTIVE = SAVED;

  function apply(name) {
    var link = document.getElementById('theme-style');
    if (link) link.href = link.href.replace(/themes\/[^/]+\.css/, 'themes/' + name + '.css');
    var sl = document.getElementById('syntax-light');
    var sd = document.getElementById('syntax-dark');
    if (sl && sd) {
      if (FORCED_DARK.indexOf(name) >= 0) {
        sl.disabled = true; sd.disabled = false; sd.media = 'all';
      } else if (FORCED_LIGHT.indexOf(name) >= 0) {
        sl.disabled = false; sl.media = 'all'; sd.disabled = true;
      } else {
        sl.disabled = false; sl.media = '(prefers-color-scheme: light)';
        sd.disabled = false; sd.media = '(prefers-color-scheme: dark)';
      }
    }
    var picker = document.getElementById('theme-picker');
    if (picker) picker.value = name;
    ACTIVE = name;
  }

  if (SAVED !== 'default') apply(SAVED);
  window.switchTheme = function (name) {
    localStorage.setItem('theme', name);
    apply(name);
  };
})();
  </script>
</body>
</html>
